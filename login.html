<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - WorkerConnect</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
    body{background:#f0f2f5;color:#1e293b}
    .navbar{display:flex;align-items:center;gap:16px;padding:12px 32px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1);position:sticky;top:0;z-index:100}
    .logo{font-size:22px;font-weight:800;color:#e8520a;text-decoration:none;flex-shrink:0}
    .logo span{color:#1e293b}
    .search-bar{flex:1;display:flex;align-items:center;border:2px solid #ddd;border-radius:8px;overflow:hidden;background:#fff}
    .location-box{display:flex;align-items:center;gap:6px;padding:0 12px;background:#f8f8f8;height:42px;border-right:2px solid #ddd;flex-shrink:0}
    .location-box input{border:none;outline:none;background:transparent;font-size:14px;width:80px}
    .search-input{flex:1;border:none;outline:none;padding:0 14px;font-size:14px;height:42px}
    .search-btn{background:#e8520a;border:none;padding:0 18px;height:42px;font-size:16px;cursor:pointer;color:#fff;flex-shrink:0}
    .nav-links{display:flex;align-items:center;gap:16px;flex-shrink:0}
    .nav-links a{text-decoration:none;font-size:14px;font-weight:500;color:#475569}
    .nav-links a:hover{color:#e8520a}
    .form-container{max-width:440px;margin:60px auto;background:#fff;padding:44px 40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .form-container h2{font-size:26px;font-weight:700;margin-bottom:6px;text-align:center}
    .form-subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:28px}
    .form-container input{width:100%;padding:12px 16px;margin-bottom:14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;background:#f8fafc;transition:border-color .2s}
    .form-container input:focus{border-color:#e8520a;background:#fff}
    .form-container button{width:100%;padding:13px;background:#e8520a;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
    .form-container button:hover{background:#c94208}
    .form-container p{text-align:center;margin-top:18px;font-size:14px;color:#64748b}
    .form-container a{color:#e8520a;font-weight:600;text-decoration:none}
    footer{text-align:center;padding:24px;background:#1e293b;color:#94a3b8;font-size:13px;margin-top:40px}
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Worker<span>Connect</span></a>
    <div class="search-bar">
      <div class="location-box"><span>📍</span><input type="text" placeholder="City" value="Mumbai" /></div>
      <input type="text" class="search-input" placeholder="Search for Plumber, Electrician..." />
      <button class="search-btn">🔍</button>
    </div>
    <div class="nav-links">
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <div class="form-container">
    <h2>Welcome Back</h2>
    <p class="form-subtitle">Login to your WorkerConnect account</p>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <p id="msg" style="color:red;text-align:center;margin-bottom:8px"></p>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <footer><p>© 2026 WorkerConnect. All rights reserved.</p></footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const res = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } else { msg.textContent = data.message; }
    });
  </script>
</body>
</html>
